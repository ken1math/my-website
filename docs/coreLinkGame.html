<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CORE LINK - Precise Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00e5; --bg-dark: #02050c; --panel-bg: rgba(0, 20, 40, 0.8); }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            background: var(--bg-dark); color: white; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        h1 { font-family: 'Share Tech Mono', monospace; font-size: 22px; margin: 10px 0; letter-spacing: 4px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .game-area { display: flex; gap: 10px; align-items: flex-start; margin-top: 5px; }
        .canvas-container { position: relative; border: 1px solid rgba(0, 242, 255, 0.3); padding: 4px; background: rgba(0,0,0,0.5); border-radius: 4px; }
        canvas { border: 1px solid var(--neon-blue); background: #000; display: block; max-height: 52vh; width: auto; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        
        .side-info { display: flex; flex-direction: column; gap: 8px; }
        .panel { background: var(--panel-bg); padding: 8px; border: 1px solid var(--neon-blue); width: 100px; text-align: center; position: relative; }
        .panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon-blue); }
        .label { font-size: 10px; color: var(--neon-blue); letter-spacing: 1px; margin-bottom: 3px; font-weight: bold; text-transform: uppercase; }
        .value { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: #fff; text-shadow: 0 0 5px #fff; }

        .log-container { flex-grow: 1; height: 130px; text-align: left; overflow: hidden; }
        .log-list { list-style: none; padding: 0; margin: 0; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
        .log-item { color: #666; border-left: 2px solid #222; padding-left: 5px; margin-bottom: 4px; animation: slideIn 0.2s ease-out; }
        .log-item.high { color: var(--neon-pink); border-left-color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }
        
        #chainMsg { color: var(--neon-pink); font-family: 'Share Tech Mono'; font-size: 16px; text-align: center; min-height: 1.5em; font-weight: bold; }
        .pulse-anim { animation: pulse 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); text-shadow: 0 0 20px var(--neon-pink); } 100% { transform: scale(1); } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); pointer-events: none; }
        #gameOverOverlay { pointer-events: auto; border: 1px solid var(--neon-pink); }
        #pauseOverlay { color: var(--neon-pink); font-size: 24px; letter-spacing: 8px; font-family: 'Share Tech Mono', monospace; }
        .go-title { color: var(--neon-pink); font-size: 28px; font-weight: 700; text-shadow: 0 0 15px var(--neon-pink); margin-bottom: 10px; font-family: 'Share Tech Mono', monospace; }
        
        .restart-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 16px; font-family: 'Share Tech Mono', monospace; font-size: 14px; cursor: pointer; transition: 0.3s; margin-top: 20px; pointer-events: auto; }
        .restart-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .controls-container { width: 100%; max-width: 400px; padding: 15px; display: flex; flex-direction: column; gap: 8px; margin-top: auto; margin-bottom: 5px; }
        .button-row { display: grid; gap: 8px; width: 100%; }
        .row-top { grid-template-columns: 1fr 1.5fr 1fr; }
        .row-bottom { grid-template-columns: 1.2fr 1fr 1.2fr; }

        .ctrl-btn { background: rgba(0, 40, 80, 0.4); border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 16px 0; border-radius: 4px; font-family: 'Share Tech Mono', monospace; font-size: 18px; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .pause-btn { border-color: var(--neon-pink); color: var(--neon-pink); }
    </style>
</head>
<body>
    <h1>CORE LINK System</h1>

    <div class="game-area">
        <div class="canvas-container">
            <canvas id="gameCanvas" width="240" height="480"></canvas>
            <div id="pauseOverlay" class="overlay">SIGNAL_LOST</div>
            <div id="gameOverOverlay" class="overlay">
                <div class="go-title">LINK_BROKEN</div>
                <div class="go-score">DATA_SAVED: <span id="finalScore">0</span></div>
                <button class="restart-btn" onclick="resetGame()">RE-INITIALIZE</button>
            </div>
        </div>
        <div class="side-info">
            <div class="panel">
                <div class="label">NEXT_PACKET</div>
                <canvas id="nextCanvas" width="80" height="60"></canvas>
            </div>
            <div class="panel">
                <div class="label">TOTAL_SCORE</div>
                <div id="score" class="value">0</div>
            </div>
            <div class="panel log-container">
                <div class="label">LINK_LOG</div>
                <ul id="logList" class="log-list"></ul>
            </div>
            <div id="chainMsg"></div>
        </div>
    </div>

    <div class="controls-container">
        <div class="button-row row-top">
            <button class="ctrl-btn" onmousedown="handleInput('Left')" ontouchstart="e=>{e.preventDefault(); handleInput('Left')}">◀</button>
            <button class="ctrl-btn" onmousedown="startDrop()" ontouchstart="e=>{e.preventDefault(); startDrop()}" onmouseup="stopDrop()" ontouchend="stopDrop()">▼</button>
            <button class="ctrl-btn" onmousedown="handleInput('Right')" ontouchstart="e=>{e.preventDefault(); handleInput('Right')}">▶</button>
        </div>
        <div class="button-row row-bottom">
            <button class="ctrl-btn" onmousedown="handleInput('RotateR')" ontouchstart="e=>{e.preventDefault(); handleInput('RotateR')}">SYNC↻</button>
            <button class="ctrl-btn pause-btn" onclick="togglePause()">BREAK</button>
            <button class="ctrl-btn" onmousedown="handleInput('RotateL')" ontouchstart="e=>{e.preventDefault(); handleInput('RotateL')}">SYNC↺</button>
        </div>
    </div>

<script>
/**
 * ==========================================
 * CORE LINK - CONFIG
 * ==========================================
 */
const CONFIG = {
    NORMAL_FALL_SPEED: 0.8,
    FAST_FALL_SPEED: 15.0,
    LOCK_DELAY: 500,
    FALL_ANIM_SPEED: 12,
    MATCH_COUNT: 4,
    COLS: 6,
    ROWS: 12,
    COLOR_VARIATION: 4,
    SCORE_BASE: 15,
    SHAKE_INTENSITY: 8,
    MAX_LOG_HISTORY: 5,
    LANDING_GLOW: "#fff" 
};

/**
 * SYSTEM INTERNAL
 */
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas'), nctx = nextCanvas.getContext('2d');
const scoreDisplay = document.getElementById('score'), chainMsg = document.getElementById('chainMsg'), logList = document.getElementById('logList');
const pauseOverlay = document.getElementById('pauseOverlay'), gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScoreSpan = document.getElementById('finalScore');

const ROWS = CONFIG.ROWS, COLS = CONFIG.COLS, SIZE = 40;
const CORE_COLORS = [null, 
    {main: '#00f2ff', dark: '#002a33'}, 
    {main: '#ff00e5', dark: '#33002e'}, 
    {main: '#00ff62', dark: '#003314'}, 
    {main: '#ffee00', dark: '#333300'}
];

let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
let visualBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
let score = 0, isProcessing = false, isPaused = false, isGameOver = false, lastTime = 0;
let nextColors = [rand(), rand()], player = null, fastDrop = false;
let flashingCores = [], floatingTexts = [], shakeTimer = 0;
let lockImpacts = []; 

function rand() { return Math.floor(Math.random() * CONFIG.COLOR_VARIATION) + 1; }

function drawCore(c, x, y, colorIdx, puyoSize = SIZE, isBoard = false, gx = null, gy = null, alpha = 1, isLanding = false) {
    if (!colorIdx) return;
    const col = CORE_COLORS[colorIdx];
    c.save();
    c.globalAlpha = alpha;

    if (isLanding) {
        c.shadowBlur = 15;
        c.shadowColor = CONFIG.LANDING_GLOW;
        c.strokeStyle = CONFIG.LANDING_GLOW;
    } else {
        c.strokeStyle = col.main;
    }

    if (isBoard && gx !== null && gy !== null) {
        c.lineWidth = 3;
        [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx, dy]) => {
            const nx = gx + dx, ny = gy + dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && board[ny][nx] === colorIdx) {
                c.beginPath();
                c.moveTo(x + puyoSize/2, y + puyoSize/2);
                c.lineTo(x + puyoSize/2 + dx * puyoSize/2, y + puyoSize/2 + dy * puyoSize/2);
                c.stroke();
            }
        });
    }

    c.lineWidth = 2;
    c.strokeRect(x + 6, y + 6, puyoSize - 12, puyoSize - 12);
    c.fillStyle = isLanding ? "rgba(255,255,255,0.3)" : col.dark;
    c.fillRect(x + 7, y + 7, puyoSize - 14, puyoSize - 14);
    
    c.fillStyle = isLanding ? "#fff" : col.main;
    c.shadowBlur = isLanding ? 20 : 10;
    c.shadowColor = isLanding ? "#fff" : col.main;
    c.fillRect(x + puyoSize/2 - 3, y + puyoSize/2 - 3, 6, 6);
    c.restore();
}

function spawn() {
    if (isGameOver) return;
    player = { x: 2, py: 0, colors: [...nextColors], rotation: 0, lockTimer: 0, isTouching: false };
    nextColors = [rand(), rand()];
    drawNext();
    if (!isValid(player.x, player.py, player.rotation)) {
        isGameOver = true;
        finalScoreSpan.innerText = score;
        gameOverOverlay.style.display = 'flex';
    }
}

function resetGame() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    visualBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    score = 0; scoreDisplay.innerText = "0";
    logList.innerHTML = "";
    floatingTexts = []; lockImpacts = [];
    isGameOver = false; isPaused = false; isProcessing = false;
    gameOverOverlay.style.display = 'none';
    spawn();
}

function togglePause() {
    if (isGameOver) return;
    isPaused = !isPaused;
    pauseOverlay.style.display = isPaused ? 'flex' : 'none';
}

function drawNext() {
    nctx.clearRect(0,0,80,60);
    drawCore(nctx, 10, 15, nextColors[0], 25);
    drawCore(nctx, 45, 15, nextColors[1], 25);
}

function getRotPos(x, py, rot) {
    const offsets = [[0, -SIZE], [SIZE, 0], [0, SIZE], [-SIZE, 0]];
    return { x: x * SIZE + offsets[rot][0], y: py + offsets[rot][1] };
}

function isValid(tx, ty, rot) {
    const p1 = { x: tx * SIZE, y: ty };
    const p2 = getRotPos(tx, ty, rot);
    const check = (p) => {
        const gx = Math.floor(p.x / SIZE), gy = Math.floor(p.y / SIZE), gyc = Math.ceil(p.y / SIZE);
        if (gx < 0 || gx >= COLS || gyc >= ROWS) return false;
        if (gy >= 0 && board[gy][gx]) return false;
        if (gyc >= 0 && board[gyc][gx]) return false;
        return true;
    };
    return check(p1) && check(p2);
}

function syncVisualBoard() {
    for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
            if(board[y][x]) {
                if(!visualBoard[y][x]) visualBoard[y][x] = { x: x * SIZE, y: y * SIZE, color: board[y][x] };
                else visualBoard[y][x].color = board[y][x];
            } else { visualBoard[y][x] = null; }
        }
    }
}

function updateVisuals() {
    let moving = false;
    for(let y=ROWS-1; y>=0; y--) {
        for(let x=0; x<COLS; x++) {
            const v = visualBoard[y][x];
            if(v) {
                const targetY = y * SIZE;
                if(v.y < targetY) { v.y = Math.min(v.y + CONFIG.FALL_ANIM_SPEED, targetY); moving = true; }
            }
        }
    }
    return moving;
}

async function handleChain() {
    isProcessing = true;
    let combo = 0;
    while (!isGameOver) {
        while(true) {
            let dropped = false;
            for(let x=0; x<COLS; x++) {
                for(let y=ROWS-1; y>0; y--) {
                    if(!board[y][x] && board[y-1][x]) {
                        board[y][x] = board[y-1][x]; board[y-1][x] = 0;
                        dropped = true;
                    }
                }
            }
            if(!dropped) break;
            syncVisualBoard();
            while(updateVisuals()) { render(); await wait(16); }
        }

        let matches = findMatches();
        if (matches.length === 0) break;
        
        flashingCores = matches;
        render(); await wait(150);
        flashingCores = [];
        
        combo++;
        const pts = matches.length * CONFIG.SCORE_BASE * combo;
        score += pts;
        scoreDisplay.innerText = score;
        
        chainMsg.innerText = ">> SYNC_" + combo;
        chainMsg.classList.remove('pulse-anim');
        void chainMsg.offsetWidth; 
        chainMsg.classList.add('pulse-anim');
        shakeTimer = CONFIG.SHAKE_INTENSITY + combo * 4;

        const centerMatch = matches[Math.floor(matches.length/2)];
        floatingTexts.push({ x: centerMatch.x * SIZE + SIZE/2, y: centerMatch.y * SIZE, text: `+${pts}`, alpha: 1.0 });
        
        matches.forEach(p => { board[p.y][p.x] = 0; visualBoard[p.y][p.x] = null; });
        render(); await wait(150);
    }
    if(combo > 0) {
        const li = document.createElement('li');
        li.className = 'log-item' + (combo >= 4 ? ' high' : '');
        li.innerText = `> LINK_${combo}`;
        logList.prepend(li);
        if (logList.children.length > CONFIG.MAX_LOG_HISTORY) logList.removeChild(logList.lastChild);
    }
    setTimeout(() => { chainMsg.innerText = ""; }, 1000); 
    isProcessing = false;
    spawn();
}

function findMatches() {
    const m = [], v = Array.from({length:ROWS},()=>Array(COLS).fill(false));
    const c = (x,y,col,g) => {
        if(x<0||x>=COLS||y<0||y>=ROWS||v[y][x]||board[y][x]!==col) return;
        v[y][x]=true; g.push({x,y}); [[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>c(x+d[0],y+d[1],col,g));
    };
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++)
        if(board[y][x] && !v[y][x]) { 
            const g=[]; c(x,y,board[y][x],g); 
            if(g.length >= CONFIG.MATCH_COUNT) m.push(...g); 
        }
    return m;
}

const wait = (ms) => new Promise(r => setTimeout(r, ms));

function update(time) {
    if (isGameOver) { requestAnimationFrame(update); return; }
    const dt = time - lastTime; lastTime = time;
    
    floatingTexts.forEach(ft => { ft.y -= 0.5; ft.alpha -= 0.02; });
    floatingTexts = floatingTexts.filter(ft => ft.alpha > 0);
    
    lockImpacts.forEach(li => { li.alpha -= 0.05; });
    lockImpacts = lockImpacts.filter(li => li.alpha > 0);

    if (!isProcessing && !isPaused && player) {
        const speed = fastDrop ? CONFIG.FAST_FALL_SPEED : CONFIG.NORMAL_FALL_SPEED;
        if (isValid(player.x, player.py + speed, player.rotation)) {
            player.py += speed; player.lockTimer = 0; player.isTouching = false;
        } else {
            player.isTouching = true; 
            player.lockTimer += dt;
            if (player.lockTimer > CONFIG.LOCK_DELAY) {
                
                const p1y = Math.round(player.py / SIZE), p2 = getRotPos(player.x, player.py, player.rotation);
                const p2y = Math.round(p2.y / SIZE), gx2 = Math.round(p2.x/SIZE);
                
                if (p1y >= 0 && p1y < ROWS) {
                    board[p1y][player.x] = player.colors[0];
                    lockImpacts.push({x: player.x * SIZE, y: p1y * SIZE, alpha: 1.0});
                }
                if (p2y >= 0 && p2y < ROWS && gx2 >= 0 && gx2 < COLS) {
                    board[p2y][gx2] = player.colors[1];
                    lockImpacts.push({x: gx2 * SIZE, y: p2y * SIZE, alpha: 1.0});
                }
                
                player = null; syncVisualBoard(); handleChain();
            }
        }
    }
    updateVisuals();
    render(); requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();

    if (shakeTimer > 0) {
        const mag = Math.min(shakeTimer, 10);
        ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
        shakeTimer--;
    }
    
    ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
    for(let i=1; i<COLS; i++) { ctx.beginPath(); ctx.moveTo(i*SIZE, 0); ctx.lineTo(i*SIZE, canvas.height); ctx.stroke(); }
    for(let i=1; i<ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*SIZE); ctx.lineTo(canvas.width, i*SIZE); ctx.stroke(); }

    lockImpacts.forEach(li => {
        ctx.strokeStyle = `rgba(255, 255, 255, ${li.alpha})`;
        ctx.lineWidth = 4;
        ctx.strokeRect(li.x + 2, li.y + 2, SIZE - 4, SIZE - 4);
    });

    for(let y=0;y<ROWS;y++) {
        for(let x=0;x<COLS;x++) {
            const v = visualBoard[y][x];
            if(v) {
                const isFlashing = flashingCores.some(p => p.x === x && p.y === y);
                drawCore(ctx, v.x, v.y, v.color, SIZE, true, x, y, isFlashing ? 0.3 : 1);
                if(isFlashing) {
                    ctx.fillStyle = "#fff"; ctx.shadowBlur = 20; ctx.shadowColor = "#fff";
                    ctx.fillRect(v.x+10, v.y+10, SIZE-20, SIZE-20);
                }
            }
        }
    }
    
    if(player && !isProcessing && !isPaused && !isGameOver) {
        let ghostY = player.py;
        while (isValid(player.x, ghostY + 1, player.rotation)) { ghostY++; }
        const p2_real = getRotPos(player.x, player.py, player.rotation);
        
        ctx.save();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        // ゴースト（着地点予測）も四捨五入で描画
        const gy1 = Math.round(ghostY / SIZE) * SIZE;
        const gp2 = getRotPos(player.x, ghostY, player.rotation);
        const gy2 = Math.round(gp2.y / SIZE) * SIZE;
        ctx.strokeRect(player.x*SIZE+8, gy1+8, SIZE-16, SIZE-16);
        ctx.strokeRect(Math.round(gp2.x/SIZE)*SIZE+8, gy2+8, SIZE-16, SIZE-16);
        ctx.restore();

        if(player.colors[0] === player.colors[1]) {
            ctx.strokeStyle = player.isTouching ? "#fff" : CORE_COLORS[player.colors[0]].main;
            ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(player.x*SIZE+SIZE/2, player.py+SIZE/2);
            ctx.lineTo(p2_real.x+SIZE/2, p2_real.y+SIZE/2);
            ctx.stroke();
        }
        drawCore(ctx, player.x*SIZE, player.py, player.colors[0], SIZE, false, null, null, 1, player.isTouching);
        drawCore(ctx, p2_real.x, p2_real.y, player.colors[1], SIZE, false, null, null, 1, player.isTouching);
    }

    floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(255, 255, 255, ${ft.alpha})`;
        ctx.font = "bold 18px 'Share Tech Mono'";
        ctx.textAlign = "center";
        ctx.fillText(ft.text, ft.x, ft.y);
    });

    ctx.restore();
}

function handleInput(type) {
    if(isPaused || isGameOver || isProcessing || !player) return;
    if(type === 'Left' && isValid(player.x-1, player.py, player.rotation)) player.x--;
    if(type === 'Right' && isValid(player.x+1, player.py, player.rotation)) player.x++;
    if(type === 'RotateR') tryRotate(1);
    if(type === 'RotateL') tryRotate(-1);
}

function tryRotate(dir) {
    const nextRot = (player.rotation + dir + 4) % 4;
    if (isValid(player.x, player.py, nextRot)) { player.rotation = nextRot; }
    else if (isValid(player.x + 1, player.py, nextRot)) { player.x++; player.rotation = nextRot; }
    else if (isValid(player.x - 1, player.py, nextRot)) { player.x--; player.rotation = nextRot; }
}

function startDrop() { if(!isProcessing && !isPaused) fastDrop = true; }
function stopDrop() { fastDrop = false; }

window.addEventListener('keydown', e => { 
    if(e.key.toLowerCase()==='p') togglePause();
    if(e.key === 'ArrowLeft') handleInput('Left');
    if(e.key === 'ArrowRight') handleInput('Right');
    if(e.key === 'ArrowUp') handleInput('RotateR');
    if(e.key === 'ArrowDown') startDrop();
});
window.addEventListener('keyup', e => { if(e.key === 'ArrowDown') stopDrop(); });

spawn();
requestAnimationFrame(update);
</script>
</body>
</html>
