<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Resizer Professional</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --border-color: #d2d2d7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 30px;
        }

        /* アップロードエリア */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 25px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary-color);
            background: rgba(0, 122, 255, 0.05);
        }

        .upload-zone p {
            margin: 0;
            font-size: 14px;
            color: var(--text-sub);
        }

        .file-info {
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary-color);
            display: none;
        }

        /* 設定エリア */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            background-color: #fafafa;
            appearance: none;
        }

        /* カスタム入力エリア */
        #customArea {
            grid-column: span 2;
            display: none;
            background: #f9f9fb;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        /* 実行ボタン */
        .btn-exec {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        .btn-exec:active {
            transform: scale(0.98);
        }

        .btn-exec:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ローディングアニメーション */
        .loader {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #status { font-size: 14px; color: var(--primary-color); font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>PDF Resizer</h1>
    <p class="subtitle">pdfのサイズを強制統一します</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p id="dropText">PDFファイルをここにドラッグ or タップして選択</p>
        <div id="fileInfo" class="file-info"></div>
        <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    </div>

    <div class="settings-grid">
        <div class="field">
            <label>サイズ</label>
            <select id="pageSize" onchange="handleSizeChange()">
                <option value="A4">A4 (210x297)</option>
                <option value="B4">B4 (257x364)</option>
                <option value="B5">B5 (182x257)</option>
                <option value="A3">A3 (297x420)</option>
                <option value="custom">カスタム設定...</option>
            </select>
        </div>
        <div class="field">
            <label>向き</label>
            <select id="orientation">
                <option value="portrait">縦向き</option>
                <option value="landscape">横向き</option>
            </select>
        </div>

        <div id="customArea">
            <label>カスタム (mm)</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="customW" placeholder="幅" value="210">
                <span>×</span>
                <input type="number" id="customH" placeholder="高さ" value="297">
            </div>
        </div>
    </div>

    <button id="execBtn" class="btn-exec">変換してダウンロード</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <span id="status">処理中...</span>
    </div>
</div>

<script>
    const { PDFDocument, PageSizes } = PDFLib;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileInfo = document.getElementById('fileInfo');
    const dropText = document.getElementById('dropText');
    const execBtn = document.getElementById('execBtn');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');

    let targetFile = null;

    // --- ファイル選択ハンドラ ---
    fileInput.onchange = (e) => handleFiles(e.target.files);
    
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        if (files[0] && files[0].type === 'application/pdf') {
            targetFile = files[0];
            fileInfo.innerText = `選択中: ${targetFile.name}`;
            fileInfo.style.display = 'block';
            dropText.style.display = 'none';
        }
    }

    function handleSizeChange() {
        const isCustom = document.getElementById('pageSize').value === 'custom';
        document.getElementById('customArea').style.display = isCustom ? 'block' : 'none';
    }

    // --- メイン処理 ---
    execBtn.onclick = async () => {
        if (!targetFile) return alert("PDFファイルを選択してください");

        execBtn.disabled = true;
        loader.style.display = 'block';
        status.innerText = "PDFを再構成中...";

        try {
            const arrayBuffer = await targetFile.arrayBuffer();
            const srcDoc = await PDFDocument.load(arrayBuffer);
            const outDoc = await PDFDocument.create();

            const sizeKey = document.getElementById('pageSize').value;
            const isLandscape = document.getElementById('orientation').value === 'landscape';

            let targetW, targetH;
            if (sizeKey === 'custom') {
                const mmToPt = (mm) => (mm * 72) / 25.4;
                targetW = mmToPt(parseFloat(document.getElementById('customW').value));
                targetH = mmToPt(parseFloat(document.getElementById('customH').value));
            } else {
                [targetW, targetH] = PageSizes[sizeKey];
            }

            // 向きの調整
            if (isLandscape) {
                if (targetW < targetH) [targetW, targetH] = [targetH, targetW];
            } else {
                if (targetW > targetH) [targetW, targetH] = [targetH, targetW];
            }

            const pages = srcDoc.getPages();
            for (let i = 0; i < pages.length; i++) {
                const newPage = outDoc.addPage([targetW, targetH]);
                const [embeddedPage] = await outDoc.embedPages([srcDoc.getPages()[i]]);
                newPage.drawPage(embeddedPage, { x: 0, y: 0, width: targetW, height: targetH });
            }

            const pdfBytes = await outDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `Fixed_${sizeKey}_${targetFile.name}`;
            a.click();

            status.innerText = "完了しました！";
        } catch (e) {
            console.error(e);
            alert("エラーが発生しました。");
        } finally {
            execBtn.disabled = false;
            setTimeout(() => { loader.style.display = 'none'; }, 2000);
        }
    };
</script>

</body>
</html>
